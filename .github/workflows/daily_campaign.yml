name: Daily Campaign

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Pipeline mode
        required: true
        default: full
        type: choice
        options:
          - full
          - discover
          - enrich
          - score
          - draft

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run campaign
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GMAIL_SENDER_EMAIL: ${{ secrets.GMAIL_SENDER_EMAIL }}
          GMAIL_CREDENTIALS_FILE: ${{ secrets.GMAIL_CREDENTIALS_FILE }}
          GMAIL_TOKEN_FILE: ${{ secrets.GMAIL_TOKEN_FILE }}
        run: python run_campaign.py --config config.example.yaml --mode ${{ github.event.inputs.mode || 'full' }}
